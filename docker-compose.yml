# ============================================================
#  睿承教育平台 V3.5 — Docker Compose 部署配置
#  数据库与 aliyun_mgr 共用 aliyun-mgr-db 实例
#  快速启动：  docker-compose up -d
#  停止：      docker-compose down
# ============================================================

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ruicheng-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - ./backend/sysconfig.json:/app/sysconfig.json:ro
    environment:
      SECRET_KEY: ${SECRET_KEY:-ruicheng-edu-secret-key-change-in-production}
      DATABASE_PASSWORD: PG9sekDlQfqMxRhWvrPkqrnP1M28UBy
      POSTGRES_SERVER: aliyun-mgr-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: edu_system
      POSTGRES_USER: aliyun_mgr
    networks:
      - aliyun_mgr_default
    command: >
      sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ruicheng-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aliyun_mgr_default
    command: npm run dev -- --host 0.0.0.0

  # 可选：异步任务队列（--profile async）
  redis:
    image: redis:7-alpine
    container_name: ruicheng-redis
    restart: unless-stopped
    profiles: ["async"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ruicheng-celery
    restart: unless-stopped
    profiles: ["async"]
    depends_on:
      - redis
      - backend
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_PASSWORD: PG9sekDlQfqMxRhWvrPkqrnP1M28UBy
      POSTGRES_SERVER: aliyun-mgr-db
      POSTGRES_USER: aliyun_mgr
      POSTGRES_DB: edu_system
    networks:
      - aliyun_mgr_default
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend/sysconfig.json:/app/sysconfig.json:ro

networks:
  aliyun_mgr_default:
    external: true

volumes:
  redis_data:
